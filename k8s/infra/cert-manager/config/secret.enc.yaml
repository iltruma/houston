# Secret cloudflare-api-token cifrato con SOPS + age.
# Per cifrare (dopo aver generato la chiave age e configurato .sops.yaml):
#
#   # Crea il secret in chiaro (NON committare questo file)
#   kubectl create secret generic cloudflare-api-token \
#     --namespace=cert-manager \
#     --from-literal=api-token=<TOKEN> \
#     --dry-run=client -o yaml > /tmp/cf-secret.yaml
#
#   # Cifra con SOPS
#   sops --encrypt /tmp/cf-secret.yaml > k8s/infra/cert-manager/secret.enc.yaml
#
#   # Rimuovi il file in chiaro
#   rm /tmp/cf-secret.yaml
#
# Per decifrare (verifica):
#   sops --decrypt k8s/infra/cert-manager/secret.enc.yaml
#
# NOTA: questo file placeholder verrà sovrascritto con il contenuto SOPS cifrato
# durante il sprint M3 (migrazione da SealedSecret a SOPS).
# L'attuale cloudflare-api-token-sealedsecret.yaml in k8s/apps/cert-manager/
# rimane attivo finché ArgoCD è in uso.
#
# --- PLACEHOLDER: sostituire con output di `sops --encrypt` ---
