apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.traefik.io/traefik
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 1m
  chart:
    spec:
      chart: traefik
      # ponytail: chart version (41.x), NON app version (3.7.x) — traefik slega le due
      version: "41.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 24h
  values:
    # hostNetwork: Traefik ascolta direttamente su 80/443 del nodo (no NAT,
    # no Service LoadBalancer, no klipper-lb necessario). Single-node.
    hostNetwork: true
    # hostNetwork: Traefik ascolta su 80/443 del nodo, non serve Service
    # LoadBalancer. ClusterIP evita un Service <pending> inutile.
    service:
      type: ClusterIP
    # dnsPolicy sotto deployment (schema chart): mantiene il DNS del cluster
    # per la risoluzione dei Service (kubernetesCRD provider) anche in
    # hostNetwork.
    deployment:
      replicas: 1
      dnsPolicy: ClusterFirstWithHostNet
      # hostNetwork: serve Recreate strategy perché il nuovo pod bind
      # 80/443/8080/9100 in hostNet e RollingUpdate farebbe Pending per
      # conflict porte col vecchio pod. Recreate termina prima.
      strategy:
        type: Recreate
      # hostNetwork + porte < 1024 (80, 443) → serve NET_BIND_SERVICE.
      # Senza, Traefik crasha con "bind: permission denied" sulla porta 80.
      podSecurityContext:
        capabilities:
          add:
            - NET_BIND_SERVICE
    ports:
      web:
        port: 80
        hostPort: 80
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        port: 443
        hostPort: 443
        exposedPort: 443
        http:
          tls:
            enabled: true
    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
    ingressRoute:
      dashboard:
        enabled: false   # dashboard esposta manualmente se serve
