apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: houston-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/iltruma/houston.git
        revision: HEAD
        directories:
          - path: k8s/apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
      finalizers:
        - resources-finalizer.argocd.io
    spec:
      project: default
      source:
        repoURL: https://github.com/iltruma/houston.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
