apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Nessun namespace globale: le risorse qui hanno namespace diversi
# (ClusterIssuer è cluster-scoped; Certificate è in kube-system;
# il Secret cloudflare-api-token vive in cert-manager).
resources:
  - clusterissuer-staging.yaml
  - clusterissuer-production.yaml
  - wildcard-certificate.yaml

# Il Secret cloudflare-api-token (DNS-01) sarà cifrato con SOPS+age e
# generato da KSOPS al sync di ArgoCD (S5, da aggiungere).
# generators:
#   - ./secret-generator.yaml
