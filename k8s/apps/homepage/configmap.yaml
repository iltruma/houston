apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Houston Homelab
    headerStyle: clean
    theme: dark
    color: slate
    layout:
      Infrastructure:
        style: row
        columns: 4

  services.yaml: |
    - Infrastructure:
        - Proxmox:
            href: https://192.168.178.2:8006
            description: Hypervisor (houston)
            icon: proxmox.png
        - Pi-hole:
            href: https://192.168.178.4
            description: DNS & ad-blocking (sentinel)
            icon: pi-hole.png
        - ArgoCD:
            href: https://argocd.internal
            description: GitOps (iss)
            icon: argocd.png
        - step-ca:
            href: https://vanguard.internal:9000
            description: Network CA (vanguard)
            icon: smallstep.png

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank

  bookmarks.yaml: |
    - Repos:
        - Houston:
            - abbr: HO
              href: https://github.com/iltruma/houston
