apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
data:
  # config.yaml for cloudflared.
  # Il token (TUNNEL_TOKEN env var) è self-contained: contiene già
  # tunnel ID + credenziali. NON mettere `tunnel:` o `credentials-file:`
  # qui — quei campi servono per il vecchio flusso con cert.pem e
  # fanno fallire con l'errore "Cannot determine default origin
  # certificate path".
  #
  # Ingress rules: first match wins, last rule is the catch-all 404.
  # Public DNS (CNAME) si crea nella dashboard Cloudflare, non qui.
  config.yaml: |
    metrics: 0.0.0.0:2000

    # autoupdate is wrong in k8s: the pod is replaced by a Deployment
    # rollout, so an auto-updated binary is lost. Disable it.
    no-autoupdate: true

    ingress:
      # Uptime Kuma (v1: unico servizio esposto).
      # No TLS verify on the internal side: k3s uses a wildcard cert from
      # cert-manager; we still want to trust it. Default `service` uses
      # HTTPS, but we need `noTLSVerify: true` for the internal hop.
      - hostname: uptime.paroparo.it
        service: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
        originRequest:
          noTLSVerify: true

      # Catch-all: 404 for any hostname not listed above.
      - service: http_status:404
