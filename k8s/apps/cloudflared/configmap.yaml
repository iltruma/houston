apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
data:
  # config.yaml di cloudflared. Editabile a mano: per esporre un nuovo
  # servizio aggiungi una entry nella lista `ingress` qui sotto (prima del
  # catch-all 404), poi commit + push — ArgoCD sincronizza.
  #
  # Il TUNNEL_TOKEN (env var dal Secret) è self-contained: contiene già
  # tunnel ID + credenziali. NON aggiungere `tunnel:` né `credentials-file:`
  # qui — sono del flusso legacy con cert.pem e fanno fallire con
  # "Cannot determine default origin certificate path".
  #
  # Ingress rules: vince la prima che matcha, l'ultima è il catch-all 404.
  # Il CNAME DNS (<tunnel-id>.cfargotunnel.com) va creato a mano nella
  # Cloudflare Zero Trust dashboard per ogni hostname.
  config.yaml: |
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      - hostname: uptime.paroparo.it
        service: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
        originRequest:
          noTLSVerify: true

      # Catch-all: 404 per qualsiasi hostname non elencato sopra.
      - service: http_status:404
