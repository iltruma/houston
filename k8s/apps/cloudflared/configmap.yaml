apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
    # GENERATED by ansible/playbooks/cloudflared-install.yml
    # from cloudflared_public_hostnames in cloudflared.yml.
    # Do not edit manually: re-run the playbook to regenerate.
data:
  # config.yaml for cloudflared.
  # TUNNEL_TOKEN env var (from Secret) is self-contained: it already
  # includes tunnel ID + credentials. Do NOT add `tunnel:` or
  # `credentials-file:` here — those are the legacy flow with cert.pem
  # and break with "Cannot determine default origin certificate path".
  #
  # Ingress rules: first match wins, last rule is the catch-all 404.
  # Public DNS (CNAMEs pointing to <tunnel-id>.cfargotunnel.com) is
  # managed by the playbook via Cloudflare API, not by hand here.
  config.yaml: |
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      - hostname: uptime.paroparo.it
        service: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
        originRequest:
          noTLSVerify: true

      # Catch-all: 404 for any hostname not listed above.
      - service: http_status:404
