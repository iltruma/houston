apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - argocd.lab.paroparo.it
    # Secret name not set: Traefik uses the default wildcard secret
    # (wildcard-lab-paroparo-it-tls) from kube-system for *.lab.paroparo.it.
  rules:
  - host: argocd.lab.paroparo.it
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
