apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  # Config layer di cert-manager (ClusterIssuer, Certificate, Secret).
  # Dipende da cert-manager: aspetta che le CRD siano installate.
  dependsOn:
    - name: cert-manager
  interval: 1m
  retryInterval: 5m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/cert-manager/config
  decryption:
    provider: sops
    secretRef:
      name: sops-age
