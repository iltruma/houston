apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config
  namespace: flux-system
spec:
  # Config layer di Traefik (TLSStore).
  # Dipende da traefik: aspetta che le CRD siano installate.
  dependsOn:
    - name: traefik
  interval: 1m
  retryInterval: 5m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/traefik/config
  decryption:
    provider: sops
    secretRef:
      name: sops-age
