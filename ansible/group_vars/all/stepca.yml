# Variables for the step-ca network CA (host: vanguard)
#
# These drive ansible/playbooks/stepca-setup.yml. Versions are pinned so the
# build is reproducible — bump them deliberately.

# Internal domain used across the homelab. Changing it here updates every
# downstream reference (CA SANs, cert-manager issuer, Ingress hosts).
# NOTE: only "home.arpa" is IANA-reserved for home use; "iris.lan" works fine
# on a LAN that never queries public resolvers. Add the matching A-records in
# Pi-hole "Local DNS".
homelab_domain: "iris.lan"

# --- Smallstep versions — VERIFY latest before deploy:
#     https://github.com/smallstep/cli/releases
#     https://github.com/smallstep/certificates/releases
step_cli_version: "0.30.2"     # the `step` command-line client
step_ca_version: "0.30.2"      # the `step-ca` server daemon

# --- CA identity
stepca_name: "Houston Homelab CA"
stepca_dns_names:              # SANs the CA server is reachable as
  - "vanguard.iris.lan"
  - "192.168.178.5"
stepca_listen_address: ":9000"
# => ACME directory: https://vanguard.iris.lan:9000/acme/acme/directory

# ACME provisioner name. cert-manager references this in the ClusterIssuer URL.
stepca_acme_provisioner: "acme"

# Where the CA stores its config, keys and DB on the LXC.
stepca_home: "/etc/step-ca"

# The CA signing-key password is NOT stored here. Add it (encrypted) to
# ansible/group_vars/all/vault.yml:
#   stepca_password: "<strong-random-password>"
