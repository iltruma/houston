pihole_base_url: "https://192.168.178.4"

# Network config seeded into setupVars.conf for the unattended install.
# The Pi-hole IP itself comes from the inventory (ansible_host of sentinel).
pihole_interface: "eth0"
pihole_cidr_prefix: 24
pihole_upstream_dns:
  - "1.1.1.1"
  - "8.8.8.8"

pihole_dns_records:
  - { ip: "192.168.178.2", hostname: "houston.internal" }
  - { ip: "192.168.178.3", hostname: "iss.internal" }
  - { ip: "192.168.178.3", hostname: "argocd.internal" }
  - { ip: "192.168.178.3", hostname: "homepage.internal" }
  - { ip: "192.168.178.4", hostname: "sentinel.internal" }

pihole_adlists:
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
  - "https://v.firebog.net/hosts/AdguardDNS.txt"
  - "https://v.firebog.net/hosts/Easyprivacy.txt"
  - "https://v.firebog.net/hosts/Prigent-Crypto.txt"
