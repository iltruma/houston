pihole_base_url: "https://192.168.178.4"

# Network config seeded into setupVars.conf for the unattended install.
# The Pi-hole IP itself comes from the inventory (ansible_host of sentinel).
pihole_interface: "eth0"
pihole_cidr_prefix: 24
pihole_upstream_dns:
  - "1.1.1.1"
  - "8.8.8.8"

pihole_dns_records:
  # Host: record espliciti. I record host hanno precedenza sul wildcard sottostante.
  - { ip: "192.168.178.2", hostname: "houston.lab.paroparo.it" }
  - { ip: "192.168.178.3", hostname: "iss.lab.paroparo.it" }
  - { ip: "192.168.178.4", hostname: "sentinel.lab.paroparo.it" }

# Wildcard DNS: *.lab.paroparo.it → ingress k3s (ISS)
# Configurato via dnsmasq_lines in pihole.toml (Pi-hole v6 non legge /etc/dnsmasq.d/).
pihole_wildcard_domain: "lab.paroparo.it"
pihole_wildcard_ip: "192.168.178.3"

pihole_adlists:
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
  - "https://v.firebog.net/hosts/AdguardDNS.txt"
  - "https://v.firebog.net/hosts/Easyprivacy.txt"
  - "https://v.firebog.net/hosts/Prigent-Crypto.txt"
