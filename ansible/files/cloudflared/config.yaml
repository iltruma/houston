# cloudflared config for homelab tunnel.
# Mirrored in k8s/apps/cloudflared/configmap.yaml (ArgoCD-managed).
#
# Il token (TUNNEL_TOKEN env var) è self-contained: contiene già
# tunnel ID + credenziali. NON mettere `tunnel:` o `credentials-file:`
# qui — fanno fallire con l'errore "Cannot determine default origin
# certificate path".
#
# Public hostnames: aggiungili nella Cloudflare Zero Trust dashboard
# (Networks → Tunnels → homelab → Public Hostname). La dashboard
# crea i CNAME records automaticamente.

metrics: 0.0.0.0:2000
no-autoupdate: true

ingress:
  - hostname: uptime.paroparo.it
    service: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
    originRequest:
      noTLSVerify: true

  - service: http_status:404
