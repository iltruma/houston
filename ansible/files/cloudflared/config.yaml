# cloudflared config for homelab tunnel.
# Mirror of k8s/apps/cloudflared/configmap.yaml (ArgoCD-managed).
# Both files are GENERATED from cloudflared_public_hostnames in
# ansible/group_vars/all/cloudflared.yml via cloudflared-install.yml.
# Use this file to test locally:
#   TUNNEL_TOKEN=<your-token> cloudflared tunnel --config config.yaml run
#
# TUNNEL_TOKEN (env var) is self-contained: includes tunnel ID + creds.
# Do NOT add `tunnel:` or `credentials-file:` here.

metrics: 0.0.0.0:2000
no-autoupdate: true

ingress:
  - hostname: uptime.paroparo.it
    service: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
    originRequest:
      noTLSVerify: true

  - service: http_status:404
