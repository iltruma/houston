- name: Install/upgrade cert-manager
  hosts: iss
  become: true

  tasks:
    - name: Copy cert-manager Helm values to remote
      ansible.builtin.copy:
        src: ../../k8s/bootstrap/cert-manager-values.yaml
        dest: /tmp/cert-manager-values.yaml
        mode: '0644'

    # helm repo add è idempotente: se il repo esiste già con la stessa URL
    # stampa "already exists" su stdout e restituisce exit 0 senza modificare nulla.
    - name: Add Jetstack Helm repo
      ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
      register: repo_add
      changed_when: "'already exists' not in repo_add.stdout"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # upgrade --install: idempotente. Fa l'install al primo run e l'upgrade
    # a ogni run successivo, applicando i valori e la versione pinnata. Stesso
    # pattern di argocd-install.yml: rilanciare il playbook con un nuovo
    # cert_manager_chart_version aggiorna il release in-place.
    - name: Install/upgrade cert-manager via Helm
      ansible.builtin.command:
        cmd: >
          helm upgrade --install cert-manager jetstack/cert-manager
          --namespace cert-manager
          --create-namespace
          --version {{ cert_manager_chart_version }}
          --values /tmp/cert-manager-values.yaml
      register: certmanager_helm
      changed_when: "'has been upgraded' in certmanager_helm.stdout or 'has been installed' in certmanager_helm.stdout"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # Il webhook valida le risorse Certificate/ClusterIssuer: deve essere Ready
    # prima che ArgoCD provi ad applicare i manifest di cert-manager.
    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for cert-manager controller to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
