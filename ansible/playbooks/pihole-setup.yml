- name: Install Pihole
  hosts: sentinel
  become: true

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
        state: present
        update_cache: true

    - name: Create pihole config directory
      ansible.builtin.file:
        path: /etc/pihole
        state: directory
        mode: '0755'

    - name: Create setupVars.conf for unattended install
      ansible.builtin.copy:
        dest: /etc/pihole/setupVars.conf
        content: |
          PIHOLE_INTERFACE=eth0
          IPV4_ADDRESS=192.168.178.4/24
          IPV6_ADDRESS=
          PIHOLE_DNS_1=1.1.1.1
          PIHOLE_DNS_2=8.8.8.8
          QUERY_LOGGING=true
          INSTALL_WEB_SERVER=true
          INSTALL_WEB_INTERFACE=true
          LIGHTTPD_ENABLED=false
        mode: '0644'

    - name: Install Pihole unattended
      ansible.builtin.shell: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
      args:
        creates: /usr/local/bin/pihole

    # Pi-hole v6: pihole.toml is generated by the installer.
    # port = "443s" tells FTL to listen on 443 with TLS (auto self-signed cert).
    # da verificare: grep -n "port" /etc/pihole/pihole.toml to confirm the field path.
    - name: Configure HTTPS on port 443 in pihole.toml
      ansible.builtin.lineinfile:
        path: /etc/pihole/pihole.toml
        regexp: '^\s*port\s*='
        line: '  port = "443s"'

    # Pi-hole v6 stores passwords differently from v5 (no more double-SHA256).
    # Using the CLI ensures the correct hash format is written to pihole.toml.
    - name: Set pihole web password
      ansible.builtin.command: pihole setpassword "{{ pihole_password }}"
      no_log: true
      changed_when: true

    - name: Fix Pi-hole directory ownership for API
      ansible.builtin.file:
        path: /etc/pihole
        owner: pihole
        group: pihole
        recurse: true

    - name: Restart pihole-FTL to apply config
      ansible.builtin.systemd_service:
        name: pihole-FTL
        state: restarted

    - name: Wait for pihole-FTL HTTPS API to be ready
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 443
        delay: 5
        timeout: 60

    - name: Authenticate to Pihole API
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/auth"
        method: POST
        body_format: json
        body:
          password: "{{ pihole_password }}"
        status_code: [200]
        return_content: true
        validate_certs: false
      register: pihole_auth
      no_log: true

    - name: Add adlists via API
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/lists?type=block"
        method: POST
        headers:
          X-FTL-SID: "{{ pihole_auth.json.session.sid }}"
        body_format: json
        body:
          address: "{{ item }}"
          comment: "Managed by Ansible"
          groups: [0]
          enabled: true
        status_code: [200, 201, 400, 409]
        validate_certs: false
      loop: "{{ pihole_adlists }}"
      register: pihole_adlists_result
      changed_when: pihole_adlists_result.status == 201
      notify: Update gravity

  handlers:
    - name: Update gravity
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/action/gravity"
        method: POST
        headers:
          X-FTL-SID: "{{ pihole_auth.json.session.sid }}"
        status_code: [200]
        validate_certs: false
