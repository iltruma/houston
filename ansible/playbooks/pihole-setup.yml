- name: Install Pihole
  hosts: sentinel
  become: true

  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
        state: present
        update_cache: true

    - name: Create pihole config directory
      ansible.builtin.file:
        path: /etc/pihole
        state: directory
        mode: '0755'

    # setupVars.conf è un artefatto Pi-hole v5: in v6 la config "vera" vive in
    # pihole.toml (generato dall'installer). Lo teniamo perché basic-install.sh
    # lo legge ancora per girare in modalità --unattended (semina interfaccia,
    # web server, ecc.) ed evitare i dialoghi interattivi.
    # Gli upstream DNS (PIHOLE_DNS_1/2) vengono migrati in pihole.toml dall'installer
    # v6. Se dopo l'install mancano, controllare con: grep -A3 "\[dns\]" /etc/pihole/pihole.toml
    - name: Create setupVars.conf for unattended install
      ansible.builtin.copy:
        dest: /etc/pihole/setupVars.conf
        content: |
          PIHOLE_INTERFACE={{ pihole_interface }}
          IPV4_ADDRESS={{ ansible_host }}/{{ pihole_cidr_prefix }}
          IPV6_ADDRESS=
          PIHOLE_DNS_1={{ pihole_upstream_dns[0] }}
          PIHOLE_DNS_2={{ pihole_upstream_dns[1] }}
          QUERY_LOGGING=true
          INSTALL_WEB_SERVER=true
          INSTALL_WEB_INTERFACE=true
          LIGHTTPD_ENABLED=false
        mode: '0644'

    # set -o pipefail: senza, se curl fallisce la pipe "riesce" comunque
    # e bash esegue uno script vuoto — l'errore passerebbe inosservato.
    - name: Install Pihole unattended
      ansible.builtin.shell: |
        set -o pipefail
        curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
      args:
        executable: /bin/bash
        creates: /usr/local/bin/pihole

    # Pi-hole v6: pihole.toml is generated by the installer.
    # port = "443s" tells FTL to listen on 443 with TLS (auto self-signed cert).
    - name: Configure HTTPS on port 443 in pihole.toml
      ansible.builtin.lineinfile:
        path: /etc/pihole/pihole.toml
        regexp: '^\s*port\s*='
        line: '  port = "443s"'

    # Pi-hole v6 stores passwords differently from v5 (no more double-SHA256).
    # Using the CLI ensures the correct hash format is written to pihole.toml.
    - name: Set pihole web password
      ansible.builtin.command: pihole setpassword "{{ pihole_password }}"
      no_log: true
      changed_when: true

    - name: Fix Pi-hole directory ownership for API
      ansible.builtin.file:
        path: /etc/pihole
        owner: pihole
        group: pihole
        recurse: true

    - name: Restart pihole-FTL to apply config
      ansible.builtin.systemd_service:
        name: pihole-FTL
        state: restarted

    - name: Wait for pihole-FTL HTTPS API to be ready
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 443
        delay: 5
        timeout: 60

    - name: Authenticate to Pihole API
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/auth"
        method: POST
        body_format: json
        body:
          password: "{{ pihole_password }}"
        status_code: [200]
        return_content: true
        validate_certs: false
      register: pihole_auth
      no_log: true

    - name: Add adlists via API
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/lists?type=block"
        method: POST
        headers:
          X-FTL-SID: "{{ pihole_auth.json.session.sid }}"
        body_format: json
        body:
          address: "{{ item }}"
          comment: "Managed by Ansible"
          groups: [0]
          enabled: true
        status_code: [200, 201, 400, 409]
        validate_certs: false
      loop: "{{ pihole_adlists }}"
      register: pihole_adlists_result
      changed_when: pihole_adlists_result.status == 201
      notify: Update gravity

    # Pi-hole v6 local DNS records — stored in FTL config, not in custom.list.
    # PUT /api/config/dns/hosts/{record} is idempotent: 200 = already exists, 201 = created.
    # To remove records: delete from Pi-hole UI or recreate the LXC via Terraform.
    - name: Add local DNS records
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/config/dns/hosts/{{ item.ip | urlencode }}%20{{ item.hostname | urlencode }}"
        method: PUT
        headers:
          X-FTL-SID: "{{ pihole_auth.json.session.sid }}"
        status_code: [200, 201, 400]
        validate_certs: false
      loop: "{{ pihole_dns_records }}"
      register: pihole_dns_result
      changed_when: pihole_dns_result.status == 201
      failed_when: >
        pihole_dns_result.status == 400 and
        pihole_dns_result.json.error.hint != 'Uniqueness of items is enforced'

    # Wildcard DNS via pihole.toml: Pi-hole v6 non legge /etc/dnsmasq.d/ automaticamente.
    # Le direttive dnsmasq custom si iniettano tramite dnsmasq_lines in [misc].
    - name: Configure wildcard DNS for *.{{ pihole_wildcard_domain }}
      ansible.builtin.lineinfile:
        path: /etc/pihole/pihole.toml
        regexp: '^\s*dnsmasq_lines\s*='
        line: '  dnsmasq_lines = ["address=/{{ pihole_wildcard_domain }}/{{ pihole_wildcard_ip }}"]'
      notify: Restart pihole-FTL

    # Host monitoring: espone le metriche di sentinel su :9100 (vedi tasks/node-exporter.yml)
    - name: Install node_exporter
      ansible.builtin.import_tasks: ../tasks/node-exporter.yml
      tags: node_exporter

  handlers:
    - name: Restart pihole-FTL
      ansible.builtin.systemd_service:
        name: pihole-FTL
        state: restarted

    - name: Update gravity
      ansible.builtin.uri:
        url: "{{ pihole_base_url }}/api/action/gravity"
        method: POST
        headers:
          X-FTL-SID: "{{ pihole_auth.json.session.sid }}"
        status_code: [200]
        validate_certs: false
