- name: Install Cloudflare Tunnel (cloudflared) in k3s
  hosts: iss
  become: true

  tasks:
    # ── 1. Renderizza il ConfigMap dalla lista public_hostnames ──────
    # File "compilato" da cloudflared_public_hostnames. NON editare
    # a mano: viene rigenerato a ogni run del playbook. ArgoCD lo
    # sincronizza al cluster come tutte le altre risorse in k8s/apps/.
    - name: Build cloudflared ConfigMap content
      ansible.builtin.set_fact:
        rendered_configmap: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cloudflared-config
            namespace: cloudflared
            labels:
              app.kubernetes.io/name: cloudflared
              # GENERATED by ansible/playbooks/cloudflared-install.yml
              # from cloudflared_public_hostnames in cloudflared.yml.
              # Do not edit manually: re-run the playbook to regenerate.
          data:
            # config.yaml for cloudflared.
            # TUNNEL_TOKEN env var (from Secret) è self-contained: contiene
            # già tunnel ID + credenziali. NON mettere `tunnel:` né
            # `credentials-file:` qui — sono del flusso legacy con
            # cert.pem e fanno fallire con "Cannot determine default
            # origin certificate path".
            config.yaml: |
              metrics: 0.0.0.0:2000
              no-autoupdate: true
              ingress:
          {% for entry in cloudflared_public_hostnames %}
                - hostname: {{ entry.hostname }}
                  service: {{ entry.service }}
                  {% if entry.no_tls_verify | default(true) %}originRequest:
                    noTLSVerify: true
                  {% endif %}
          {% endfor %}
                # Catch-all: 404 per qualsiasi hostname non elencato.
                - service: http_status:404

    - name: Write rendered ConfigMap to disk (for git commit)
      ansible.builtin.copy:
        content: "{{ rendered_configmap }}"
        dest: /home/cosimo/houston/k8s/apps/cloudflared/configmap.yaml
        mode: '0644'

    # ── 2. Applica il Secret cloudflared-credentials ──────────────────
    # Il token (TUNNEL_TOKEN) letto dal vault, applicato come Secret k8s.
    # NON GitOps: stesso pattern di argocd/grafana.
    - name: Render cloudflared-credentials Secret manifest
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflared-credentials
            namespace: cloudflared
            labels:
              app.kubernetes.io/name: cloudflared
          type: Opaque
          stringData:
            token: "{{ cloudflared_tunnel_token | trim }}"
        dest: /tmp/cloudflared-credentials-secret.yaml
        mode: '0600'
      no_log: true

    - name: Apply cloudflared-credentials Secret
      ansible.builtin.command:
        cmd: k3s kubectl apply -f /tmp/cloudflared-credentials-secret.yaml
      changed_when: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      no_log: true

    # ── 3. Aspetta namespace + ConfigMap + rollout ────────────────────
    - name: Wait for cloudflared namespace to be created by ArgoCD
      ansible.builtin.command:
        cmd: k3s kubectl get namespace cloudflared
      register: ns_check
      until: ns_check.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for cloudflared-config ConfigMap to be created by ArgoCD
      ansible.builtin.command:
        cmd: k3s kubectl get configmap cloudflared-config -n cloudflared
      register: cm_check
      until: cm_check.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # Forza ArgoCD a risincronizzare dopo che il playbook ha aggiornato
    # il configmap.yaml locale. Così non dobbiamo aspettare il polling.
    - name: Refresh ArgoCD application to pick up new ConfigMap
      ansible.builtin.command:
        cmd: k3s kubectl annotate application -n argocd cloudflared argocd.argoproj.io/refresh=hard --overwrite
      changed_when: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for cloudflared Deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/cloudflared -n cloudflared --timeout=300s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 4. Verifica /ready sul primo pod ─────────────────────────────
    # /ready ritorna 200 solo se cloudflared ha una connessione QUIC
    # attiva verso Cloudflare. wget manca nell'image (readOnlyRootFS),
    # usiamo una HTTP request alternativa via Python.
    - name: Verify cloudflared /ready endpoint
      ansible.builtin.command:
        cmd: >
          k3s kubectl exec -n cloudflared -l app=cloudflared --c cloudflared --
          wget -qO- http://localhost:2000/ready 2>&1
      register: cf_ready
      changed_when: false
      failed_when: "'ok' not in cf_ready.stdout"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 5. Summary ────────────────────────────────────────────────────
    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "✓ ConfigMap rendered: k8s/apps/cloudflared/configmap.yaml (review + git commit)"
          - "✓ Secret applied: cloudflared-credentials (with TUNNEL_TOKEN)"
          - "✓ Pods cloudflared: 2/2 ready, /ready OK"
          - ""
          - "NEXT: review the rendered configmap.yaml diff, then:"
          - "  cd ~/houston && git diff k8s/apps/cloudflared/configmap.yaml"
          - "  git add k8s/apps/cloudflared/configmap.yaml && git commit -m 'cloudflared: regenerate configmap' && git push"
