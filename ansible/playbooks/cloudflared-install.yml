- name: Smoke test Cloudflare Tunnel (cloudflared)
  hosts: iss
  become: true

  # cloudflared è ora 100% GitOps: Namespace, ConfigMap, SealedSecret
  # (token cifrato) e Deployment vivono in k8s/apps/cloudflared/ e sono
  # sincronizzati da ArgoCD. Il TUNNEL_TOKEN non è più applicato da qui:
  # è cifrato nel SealedSecret e decifrato in-cluster dal controller
  # Sealed Secrets. Questo playbook non modifica nulla, verifica soltanto
  # che il deploy sia salito. Per aggiungere un hostname pubblico si edita
  # a mano configmap.yaml e si committa.

  tasks:
    # ── 1. Aspetta che ArgoCD abbia creato il namespace ───────────────
    - name: Wait for cloudflared namespace to be created by ArgoCD
      ansible.builtin.command:
        cmd: k3s kubectl get namespace cloudflared
      register: ns_check
      until: ns_check.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 2. Smoke test: aspetta il rollout ─────────────────────────────
    # Deployment, ConfigMap e SealedSecret sono creati da ArgoCD. Il
    # rollout completa solo dopo che il controller ha decifrato il
    # SealedSecret nel Secret cloudflared-credentials montato dal pod.
    - name: Wait for cloudflared Deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/cloudflared -n cloudflared --timeout=300s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 3. Summary ────────────────────────────────────────────────────
    # Nota: non eseguiamo kubectl exec per verificare /ready perché
    # l'image cloudflared è distroless (no shell, no wget, no curl).
    # La garanzia equivalente è data da:
    #   - readinessProbe sul Deployment (httpGet /ready:2000)
    #   - rollout status completato con successo nel task precedente
    # Se rollout status passa, tutti i pod hanno superato /ready.
    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "✓ Pods cloudflared: ready (/ready OK via readinessProbe)"
          - ""
          - "Tutto cloudflared è GitOps (incluso il token via SealedSecret):"
          - "edita k8s/apps/cloudflared/, poi commit + push — ArgoCD sincronizza."
