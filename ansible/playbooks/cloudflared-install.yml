- name: Install Cloudflare Tunnel (cloudflared) Secret in k3s
  hosts: iss
  become: true

  # Questo playbook fa UNA cosa sola: applicare il Secret con il
  # TUNNEL_TOKEN, che non può stare in Git. Tutto il resto del deploy
  # (Namespace, ConfigMap, Deployment) è GitOps: vive in
  # k8s/apps/cloudflared/ ed è sincronizzato da ArgoCD. Per aggiungere un
  # hostname pubblico si edita a mano configmap.yaml e si committa.

  tasks:
    # ── 1. Aspetta che ArgoCD abbia creato il namespace ───────────────
    # Il Secret va applicato DENTRO il namespace cloudflared, quindi il
    # namespace deve esistere prima. Lo crea ArgoCD da namespace.yaml.
    - name: Wait for cloudflared namespace to be created by ArgoCD
      ansible.builtin.command:
        cmd: k3s kubectl get namespace cloudflared
      register: ns_check
      until: ns_check.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 2. Applica il Secret cloudflared-credentials ──────────────────
    # Il token (TUNNEL_TOKEN) letto dal vault, applicato come Secret k8s.
    # NON GitOps: stesso pattern di argocd/grafana (contiene un segreto).
    - name: Render cloudflared-credentials Secret manifest
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflared-credentials
            namespace: cloudflared
            labels:
              app.kubernetes.io/name: cloudflared
          type: Opaque
          stringData:
            token: "{{ cloudflared_tunnel_token | trim }}"
        dest: /tmp/cloudflared-credentials-secret.yaml
        mode: '0600'
      no_log: true

    - name: Apply cloudflared-credentials Secret
      ansible.builtin.command:
        cmd: k3s kubectl apply -f /tmp/cloudflared-credentials-secret.yaml
      changed_when: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      no_log: true

    - name: Remove cloudflared-credentials Secret manifest from disk
      ansible.builtin.file:
        path: /tmp/cloudflared-credentials-secret.yaml
        state: absent

    # ── 3. Smoke test: aspetta il rollout ─────────────────────────────
    # Deployment e ConfigMap sono creati da ArgoCD. Qui verifichiamo solo
    # che il rollout completi dopo che il Secret è disponibile.
    - name: Wait for cloudflared Deployment to be ready
      ansible.builtin.command:
        cmd: k3s kubectl rollout status deployment/cloudflared -n cloudflared --timeout=300s
      changed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── 4. Summary ────────────────────────────────────────────────────
    # Nota: non eseguiamo kubectl exec per verificare /ready perché
    # l'image cloudflared è distroless (no shell, no wget, no curl).
    # La garanzia equivalente è data da:
    #   - readinessProbe sul Deployment (httpGet /ready:2000)
    #   - rollout status completato con successo nel task precedente
    # Se rollout status passa, tutti i pod hanno superato /ready.
    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "✓ Secret applied: cloudflared-credentials (with TUNNEL_TOKEN)"
          - "✓ Pods cloudflared: 2/2 ready (/ready OK via readinessProbe)"
          - ""
          - "ConfigMap e Deployment sono GitOps: editali in k8s/apps/cloudflared/,"
          - "poi commit + push — ArgoCD sincronizza al cluster."
