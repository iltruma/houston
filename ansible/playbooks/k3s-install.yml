- name: Prepare k3s node
  hosts: iss
  become: true

  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: iss

    # set -o pipefail: senza, se curl fallisce la pipe "riesce" comunque
    # e sh esegue uno script vuoto — l'errore passerebbe inosservato.
    - name: Install k3s
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL https://get.k3s.io | sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/k3s

    - name: Wait for k3s node to be Ready
      ansible.builtin.command: k3s kubectl get nodes
      register: nodes_output
      until: "'Ready' in nodes_output.stdout"
      retries: 20
      delay: 15
      changed_when: false

    - name: Fetch kubeconfig to workstation
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env', 'HOME') }}/.kube/config-k3s"
        flat: true

- name: Configure kubeconfig on workstation
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0700'

    - name: Fix kubeconfig server address
      ansible.builtin.replace:
        path: "{{ lookup('env', 'HOME') }}/.kube/config-k3s"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: 'https://192.168.178.3:6443'

    - name: Set kubeconfig permissions
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube/config-k3s"
        mode: '0600'
