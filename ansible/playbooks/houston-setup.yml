- name: Configure houston (Proxmox host)
  hosts: houston
  become: true

  vars:
    nvme_device: /dev/nvme0n1
    sata_vg: pve
    # Privilegi del ruolo "Provisioner" condiviso da terraform@pve e packer@pve.
    # Coprono VM/LXC, dischi, cloud-init, storage e rete; NIENTE gestione utenti,
    # reboot host o modifica permessi.
    provisioner_privs: >-
      VM.Allocate VM.Audit VM.Clone VM.Config.CDROM VM.Config.CPU
      VM.Config.Cloudinit VM.Config.Disk VM.Config.HWType VM.Config.Memory
      VM.Config.Network VM.Config.Options VM.Console VM.Migrate VM.PowerMgmt
      VM.GuestAgent.Audit Datastore.Allocate Datastore.AllocateSpace
      Datastore.AllocateTemplate Datastore.Audit Pool.Audit Sys.Audit
      Sys.Modify SDN.Use

  handlers:
    - name: Restart pveproxy
      ansible.builtin.service:
        name: pveproxy
        state: restarted

  tasks:

    # ── APT repositories ─────────────────────────────────────────────────────
    # Proxmox VE 9 usa il formato deb822 (.sources), non i classici .list.
    # I repo enterprise si disabilitano con "Enabled: no" (non commentando con #).

    - name: Disable enterprise PVE repository
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list.d/pve-enterprise.sources
        regexp: '^Enabled:'
        line: 'Enabled: no'

    - name: Disable enterprise Ceph repository
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list.d/ceph.sources
        regexp: '^Enabled:'
        line: 'Enabled: no'

    - name: Remove old .list no-subscription repo (formato legacy)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-no-subscription.list
        state: absent

    - name: Add no-subscription PVE repository (deb822)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.sources
        mode: '0644'
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: trixie
          Components: pve-no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

    # ── System update ─────────────────────────────────────────────────────────

    - name: Update apt cache and full-upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: full

    # ── Subscription popup ────────────────────────────────────────────────────

    - name: Check if subscription popup already disabled
      ansible.builtin.command:
        cmd: grep -q "void({ //" /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      register: popup_check
      failed_when: false
      changed_when: false

    - name: Remove subscription popup from web UI
      ansible.builtin.command:
        cmd: >
          sed -Ezi.bak
          "s/(Ext\.Msg\.show\(\{\s+title: gettext\('No valid sub)/void\(\{ \/\/\1/g"
          /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      when: popup_check.rc != 0
      notify: Restart pveproxy

    # ── NVMe — thin pool per VM/LXC e PV k3s ─────────────────────────────────
    # VG "nvme" su /dev/nvme0n1; un unico thin pool occupa il 95% del VG.
    # Il 5% rimante copre i metadata LVM e l'headroom del pool.

    - name: Create VG 'nvme' on NVMe
      community.general.lvg:
        vg: nvme
        pvs: "{{ nvme_device }}"
        state: present

    - name: Create thin pool on NVMe VG
      ansible.builtin.command:
        cmd: lvcreate --type thin-pool -l 95%FREE -n nvme nvme
        creates: /dev/nvme/nvme

    - name: Get registered Proxmox storages
      ansible.builtin.command: pvesm status
      register: pvesm_status
      changed_when: false

    - name: Register nvme storage in Proxmox
      ansible.builtin.command:
        cmd: pvesm add lvmthin nvme --vgname nvme --thinpool nvme --content rootdir,images
      when: "'nvme' not in pvesm_status.stdout"

    # ── SATA — LV per media e backup ──────────────────────────────────────────
    # Spazio libero nel VG pve (grazie a maxvz=0 durante l'install):
    #   sata-media  290G → /mnt/sata-media  → disco vdc di ISS (Jellyfin + download)
    #   sata-backup 110G → /mnt/sata-backup → target vzdump (S6)

    - name: Create sata-media LV (290G)
      community.general.lvol:
        vg: "{{ sata_vg }}"
        lv: sata-media
        size: 290G
        state: present

    - name: Create sata-backup LV (110G)
      community.general.lvol:
        vg: "{{ sata_vg }}"
        lv: sata-backup
        size: 110G
        state: present

    - name: Format sata-media as ext4
      community.general.filesystem:
        fstype: ext4
        dev: /dev/pve/sata-media

    - name: Format sata-backup as ext4
      community.general.filesystem:
        fstype: ext4
        dev: /dev/pve/sata-backup

    - name: Create mount points
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /mnt/sata-media
        - /mnt/sata-backup

    - name: Mount sata-media persistently
      ansible.builtin.mount:
        path: /mnt/sata-media
        src: /dev/pve/sata-media
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Mount sata-backup persistently
      ansible.builtin.mount:
        path: /mnt/sata-backup
        src: /dev/pve/sata-backup
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Register sata-media storage in Proxmox
      ansible.builtin.command:
        cmd: pvesm add dir sata-media --path /mnt/sata-media --content images
      when: "'sata-media' not in pvesm_status.stdout"

    - name: Register sata-backup storage in Proxmox
      ansible.builtin.command:
        cmd: pvesm add dir sata-backup --path /mnt/sata-backup --content backup
      when: "'sata-backup' not in pvesm_status.stdout"

    # ── LXC templates ────────────────────────────────────────────────────────
    # Il template Debian 13 standard va scaricato una volta e usato da Terraform
    # per creare i container (sentinel, vanguard). Si aggiorna via `pveam update`.

    - name: Update pveam template database
      ansible.builtin.command: pveam update
      changed_when: false

    - name: Download Debian 13 LXC standard template
      ansible.builtin.command:
        cmd: pveam download local debian-13-standard_13.1-2_amd64.tar.zst
        creates: /var/lib/vz/template/cache/debian-13-standard_13.1-2_amd64.tar.zst

    # ── API users Proxmox (terraform@pve, packer@pve) ─────────────────────────

    - name: Create Proxmox API users for Terraform and Packer
      ansible.builtin.import_tasks: ../tasks/proxmox-api-users.yml
      tags: api_users

    # ── Host monitoring ───────────────────────────────────────────────────────

    - name: Install node_exporter
      ansible.builtin.import_tasks: ../tasks/node-exporter.yml
      tags: node_exporter
