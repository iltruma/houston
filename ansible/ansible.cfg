[defaults]
inventory = inventory.yml
# Host key checking stays ON (MITM protection). The ssh_args below soften it
# to "accept-new": unknown hosts are trusted on first contact, but a CHANGED
# key still fails. If you rebuild a VM/LXC, remove its old key first with:
#   ssh-keygen -R <ip>
host_key_checking = True

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
