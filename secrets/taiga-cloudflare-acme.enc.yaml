# secrets/taiga-cloudflare-acme.enc.yaml
#
# Token Cloudflare per ACME DNS-01 su Taiga.
# Usato da modules/klipper.nix → security.acme.certs."taiga.lab.paroparo.it"
#
# Il token deve avere permesso: Zone / DNS / Edit (solo per lab.paroparo.it)
# Crealo su: https://dash.cloudflare.com/profile/api-tokens
#
# Per cifrare (dalla workstation, con la chiave age del repo):
#   sops --encrypt --in-place secrets/taiga-cloudflare-acme.enc.yaml
#
# Formato atteso da lego/cloudflare provider (variabile d'ambiente):
CLOUDFLARE_DNS_API_TOKEN: "CHANGEME"
